<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Million Cube Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        /* Visually hidden helper for accessible labels */
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

        /* Skip link visible on keyboard focus */
        .skip-link {
            position: absolute;
            left: 8px;
            top: 8px;
            background: #111;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            z-index: 9999;
            transform: translateY(-120%);
            transition: transform 0.15s ease-in-out;
        }
        .skip-link:focus { transform: translateY(0%); outline: 3px solid #6366f1; }

        /* Larger tappable buttons for touch devices */
        .btn { min-height: 44px; padding: 12px 20px; }
        @media (max-width: 520px) { .btn { padding: 14px 22px; font-size: 16px; } }

        /* Visible focus ring for keyboard navigation */
        :focus { outline: none; }
        :focus-visible { outline: 3px solid rgba(99,102,241,0.9); outline-offset: 2px; border-radius: 6px; }
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: system-ui, -apple-system, sans-serif; }
        #viewport { width: 100vw; height: 100vh; cursor: grab; touch-action: none; }
        #viewport:active { cursor: grabbing; }
        
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }

        /* Touch handlers (pan/pinch/double-tap) are implemented in the <script> section. */

        #upload-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            z-index: 100;
            width: 320px;
            text-align: center;
        }

        .btn {
            background: #6366f1;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover { background: #4f46e5; }
        .btn-cancel { background: #222; margin-left: 8px; }

        #loading-indicator {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            padding: 8px 16px;
            border-radius: 99px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            border: 1px solid #333;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #fff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .stat-box {
            background: rgba(10, 10, 10, 0.9);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #222;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }

        /* Attribution styling and animation */
        #attribution {
            position: fixed;
            left: 12px;
            bottom: 12px;
            font-size: 15px;
            color: #d1d5db;
            z-index: 12;
            pointer-events: none;
            padding: 6px 10px;
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            backdrop-filter: blur(4px);
            animation: floatPulse 3.5s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes floatPulse {
            0% { transform: translateY(4px) scale(1); opacity: 0.9; }
            50% { transform: translateY(0) scale(1.02); opacity: 1; }
            100% { transform: translateY(4px) scale(1); opacity: 0.9; }
        }
        /* Responsive image rules for mobile previews and viewers */
        #upload-modal { width: min(92vw, 420px); }
        #upload-modal img, #preview-container img { max-width: 100%; height: auto; display: block; }
        @media (max-width: 520px) {
            #upload-modal { width: 92vw; padding: 1rem; }
            #upload-modal .w-full.h-32 { height: auto; max-height: 40vh; object-fit: contain; }
        }
    </style>
    
    <!-- Service Worker for offline caching -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('Service Worker registered:', reg.scope);
            }).catch(err => {
                console.warn('Service Worker registration failed:', err);
            });
        } else {
            console.log('Service Worker not supported; using IndexedDB caching');
        }
    </script>
</head>

<body>

    <div id="ui-layer">

    <!-- Connection Status Display -->
    <div id="connection-status" style="position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.85); padding: 12px 16px; border-radius: 8px; border: 1px solid #333; font-size: 12px; z-index: 9; display: none;">
        <span id="connection-status-text">🔌 Disconnected</span>
    </div>

    <div id="attribution">made by arjun baiju insta id: arj.unbaiju</div>

    <script>
        // Accessibility: keyboard handlers and modal state syncing
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('upload-modal');
            const btnCancel = document.getElementById('btn-cancel');
            const btnUpload = document.getElementById('btn-upload');

            function hideModal() {
                if (!modal) return;
                modal.style.display = 'none';
                modal.setAttribute('aria-hidden', 'true');
            }
            function showModal() {
                if (!modal) return;
                modal.style.display = 'block';
                modal.setAttribute('aria-hidden', 'false');
                modal.querySelector('[id]')?.focus?.();
            }

            // Close modal on Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') hideModal();
            });

            // Ensure cancel button closes modal
            if (btnCancel) btnCancel.addEventListener('click', hideModal);

            // Improve touch cursor semantics for canvas
            const canvas = document.getElementById('viewport');
            if (canvas) {
                canvas.addEventListener('keypress', (e) => {
                    // Allow Enter/Space to toggle any keyboard action if implemented later
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                    }
                });
            }
        });
    </script>
    <script>
        // --- Cookie Management System ---
        const COOKIE_CONFIG = {
            maxAge: 31536000, // 1 year in seconds
            sameSite: 'Lax',
            path: '/'
        };
        
        function setCookie(name, value, options = {}) {
            const config = { ...COOKIE_CONFIG, ...options };
            let cookieString = `${name}=${encodeURIComponent(value)}`;
            if (config.maxAge) cookieString += `; Max-Age=${config.maxAge}`;
            if (config.path) cookieString += `; Path=${config.path}`;
            if (config.sameSite) cookieString += `; SameSite=${config.sameSite}`;
            document.cookie = cookieString;
        }
        
        function getCookie(name) {
            const nameEQ = name + '=';
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(nameEQ)) {
                    return decodeURIComponent(cookie.substring(nameEQ.length));
                }
            }
            return null;
        }
        
        function deleteCookie(name) {
            setCookie(name, '', { maxAge: -1 });
        }
        
        // Cache image list in cookies for quick access
        function getCachedImageList() {
            const cached = getCookie('cubewall_images_list');
            if (cached) {
                try {
                    return JSON.parse(cached);
                } catch (e) {
                    console.warn('Failed to parse cached image list:', e);
                }
            }
            return [];
        }
        
        function saveCachedImageList(list) {
            try {
                setCookie('cubewall_images_list', JSON.stringify(list), { maxAge: 2592000 }); // 30 days
            } catch (e) {
                console.warn('Failed to cache image list:', e);
            }
        }
        
        // Track recently viewed/loaded images in cookies
        function addToRecentlyLoaded(cellId) {
            const recent = getCookie('cubewall_recent') || '';
            const ids = recent ? recent.split(',') : [];
            if (!ids.includes(cellId)) {
                ids.unshift(cellId);
                if (ids.length > 100) ids.pop(); // Keep only 100 most recent
                setCookie('cubewall_recent', ids.join(','), { maxAge: 604800 }); // 7 days
            }
        }
        
        // --- IndexedDB Cache System ---
        let indexedDBInstance;
        const dbName = 'CubeWallCache';
        const storeName = 'images';
        const metaStoreName = 'metadata';
        const dbVersion = 2;
        
        function initIndexedDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, dbVersion);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    indexedDBInstance = request.result;
                    resolve(indexedDBInstance);
                };
                request.onupgradeneeded = (e) => {
                    const database = e.target.result;
                    // Images store
                    if (!database.objectStoreNames.contains(storeName)) {
                        database.createObjectStore(storeName, { keyPath: 'id' });
                    }
                    // Metadata store for tracking
                    if (!database.objectStoreNames.contains(metaStoreName)) {
                        database.createObjectStore(metaStoreName, { keyPath: 'key' });
                    }
                };
            });
        }
        
        function cacheImage(id, imageData) {
            if (!indexedDBInstance) return Promise.reject('DB not initialized');
            return new Promise((resolve, reject) => {
                const tx = indexedDBInstance.transaction([storeName], 'readwrite');
                const store = tx.objectStore(storeName);
                const request = store.put({
                    id: id,
                    data: imageData,
                    timestamp: Date.now(),
                    size: imageData.length
                });
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    addToRecentlyLoaded(id); // Track in cookies too
                    resolve();
                };
            });
        }
        
        function getImageFromCache(id) {
            if (!indexedDBInstance) return Promise.reject('DB not initialized');
            return new Promise((resolve, reject) => {
                const tx = indexedDBInstance.transaction([storeName], 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.get(id);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    if (request.result) {
                        resolve(request.result.data);
                    } else {
                        resolve(null);
                    }
                };
            });
        }
        
        // Get cache statistics
        function getCacheStats() {
            return new Promise((resolve, reject) => {
                if (!indexedDBInstance) {
                    resolve({ images: 0, size: 0 });
                    return;
                }
                const tx = indexedDBInstance.transaction([storeName], 'readonly');
                const store = tx.objectStore(storeName);
                const countReq = store.count();
                countReq.onsuccess = () => {
                    const count = countReq.result;
                    const getAllReq = store.getAll();
                    getAllReq.onsuccess = () => {
                        let totalSize = 0;
                        getAllReq.result.forEach(item => {
                            totalSize += item.size || 0;
                        });
                        resolve({ images: count, size: totalSize });
                    };
                    getAllReq.onerror = () => resolve({ images: count, size: 0 });
                };
            });
        }

        // Load all cached images from IndexedDB into the canvas when the API/server is not available
        async function loadAllCachedImages() {
            try {
                if (!indexedDBInstance) return;
                const tx = indexedDBInstance.transaction([storeName], 'readonly');
                const store = tx.objectStore(storeName);
                const getAllReq = store.getAll();
                const results = await new Promise((resolve, reject) => {
                    getAllReq.onsuccess = () => resolve(getAllReq.result || []);
                    getAllReq.onerror = () => reject(getAllReq.error);
                });

                results.forEach(item => {
                    try {
                        const img = new Image();
                        img.src = item.data;
                        img.onload = () => {
                            occupiedCells.set(item.id, { img, loaded: true });
                        };
                        img.onerror = () => {
                            // ignore broken cached images
                        };
                    } catch (e) {}
                });
                console.log(`✓ Loaded ${results.length} cached images from IndexedDB`);
            } catch (err) {
                console.warn('Failed to load cached images:', err);
            }
        }
        
        // --- SQL Server Database System ---
        // Auto-detect API endpoint: try localhost:3000 first, then relative /api
        let SQL_API_ENDPOINT = '/api';
        if (typeof __api_endpoint !== 'undefined') {
            SQL_API_ENDPOINT = __api_endpoint;
        }
        
        let sqlServerAvailable = true;
        let sqlPaginationSize = 500; // Load in batches for large datasets
        
        async function testAPIConnection() {
            const statusEl = document.getElementById('connection-status-text');
            try {
                console.log('Testing API connection at:', SQL_API_ENDPOINT);
                const response = await fetchWithTimeout(SQL_API_ENDPOINT + '/health', { method: 'GET' }, 2000);
                if (response.ok) {
                    console.log('✓ API Server connected successfully');
                    statusEl.textContent = '🟢 Connected - API Server Ready';
                    document.getElementById('connection-status').style.display = 'block';
                    return true;
                }
            } catch (err) {
                console.log('API health check failed, trying alternate endpoint...');
            }
            
            // Try localhost:3000 as fallback
            try {
                const altEndpoint = 'http://localhost:3000/api';
                console.log('Trying alternate endpoint:', altEndpoint);
                const response = await fetchWithTimeout(altEndpoint + '/health', { method: 'GET' }, 2000);
                if (response.ok) {
                    SQL_API_ENDPOINT = altEndpoint;
                    console.log('✓ Connected to API Server at:', SQL_API_ENDPOINT);
                    statusEl.textContent = '🟢 Connected - API Server Ready';
                    document.getElementById('connection-status').style.display = 'block';
                    return true;
                }
            } catch (err) {
                console.warn('⚠ Could not connect to API Server. Running in offline mode.');
                statusEl.textContent = '🔴 Offline - Using Local Cache Only';
                document.getElementById('connection-status').style.display = 'block';
            }
            return false;
        }
        
        async function fetchImageFromSQLServer(cellId) {
            if (!sqlServerAvailable) return null;
            try {
                const response = await fetchWithTimeout(
                    `${SQL_API_ENDPOINT}/image/${cellId}`,
                    { method: 'GET' },
                    5000
                );
                if (response.ok) {
                    const data = await response.json();
                    return data.image || null;
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    console.warn('⏱ SQL Server request timeout for', cellId);
                } else if (err instanceof TypeError && err.message.includes('fetch')) {
                    console.warn('🔌 Cannot connect to SQL Server:', cellId, '- Check if API server is running at', SQL_API_ENDPOINT);
                    sqlServerAvailable = false;
                } else {
                    console.warn('SQL Server fetch failed for', cellId, ':', err.message);
                }
            }
            return null;
        }
        
        async function saveImageToSQLServer(uploadData) {
            if (!sqlServerAvailable) return false;
            try {
                const response = await fetchWithTimeout(
                    `${SQL_API_ENDPOINT}/upload`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(uploadData)
                    },
                    15000
                );
                if (response.ok) {
                    console.log('✓ Image saved to SQL Server successfully');
                    return true;
                } else {
                    console.warn('SQL Server save failed with status:', response.status);
                    return false;
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    console.warn('⏱ SQL Server upload timeout');
                } else if (err instanceof TypeError) {
                    console.warn('🔌 Cannot connect to SQL Server at', SQL_API_ENDPOINT, '- Ensure API server is running: npm start');
                    sqlServerAvailable = false;
                } else {
                    console.warn('Could not reach SQL Server:', err.message);
                }
                sqlServerAvailable = false;
                return false;
            }
        }
        
        // Helper: Fetch with timeout
        async function fetchWithTimeout(url, options = {}, timeoutMs = 10000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
            
            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return response;
            } catch (err) {
                clearTimeout(timeoutId);
                throw err;
            }
        }
        
        // Fetch all images with pagination for very large datasets
        async function getAllImagesFromSQLServerPaginated(page = 0) {
            if (!sqlServerAvailable) return [];
            try {
                const offset = page * sqlPaginationSize;
                const response = await fetchWithTimeout(
                    `${SQL_API_ENDPOINT}/images/paginated?offset=${offset}&limit=${sqlPaginationSize}`,
                    { method: 'GET' },
                    10000
                );
                if (response.ok) {
                    const data = await response.json();
                    return data.images || [];
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    console.warn('⏱ SQL Server pagination timeout at page', page);
                } else if (err instanceof TypeError) {
                    console.warn('🔌 Cannot connect to SQL Server - Check API endpoint:', SQL_API_ENDPOINT);
                } else {
                    console.warn('SQL Server paginated fetch failed:', err.message);
                }
            }
            return [];
        }
        
        async function getAllImagesFromSQLServer() {
            if (!sqlServerAvailable) return [];
            try {
                const response = await fetchWithTimeout(
                    `${SQL_API_ENDPOINT}/images/all`,
                    { method: 'GET' },
                    10000
                );
                if (response.ok) {
                    const data = await response.json();
                    return data.images || [];
                }
            } catch (err) {
                if (err.name === 'AbortError') {
                    console.warn('⏱ SQL Server bulk fetch timeout');
                } else if (err instanceof TypeError) {
                    console.warn('🔌 Cannot connect to SQL Server - Ensure API is running at:', SQL_API_ENDPOINT);
                } else {
                    console.warn('SQL Server bulk fetch failed:', err.message);
                }
            }
            return [];
        }
        
        // --- Firebase Setup ---
        let firebaseConfig;
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "AIzaSyDemo",
                authDomain: "demo.firebaseapp.com",
                projectId: "demo-project",
                storageBucket: "demo.appspot.com",
                messagingSenderId: "123456789",
                appId: "1:123456789:web:abc"
            };
        } catch (e) {
            console.warn("Firebase config parse error, using defaults:", e);
            firebaseConfig = {
                apiKey: "AIzaSyDemo",
                authDomain: "demo.firebaseapp.com",
                projectId: "demo-project",
                storageBucket: "demo.appspot.com",
                messagingSenderId: "123456789",
                appId: "1:123456789:web:abc"
            };
        }
        
        let app, auth, db;
        try {
            app = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            console.log('✓ Firebase initialized successfully');
        } catch (err) {
            console.warn('⚠ Firebase initialization failed (will use SQL Server + cache only):', err.message);
            app = null;
            auth = null;
            db = null;
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // --- Constants ---
        // Grid dimensions (width x height) — increase to expand cube wall
        const GRID_WIDTH = 2000; // was GRID_SIZE 1000
        const GRID_HEIGHT = 2000; // was GRID_SIZE 1000
        // Set cube cell to 3 inches in CSS pixels (CSS standard: 1in = 96px)
        const INCH_TO_PX = 96;
        const CELL_SIZE = INCH_TO_PX * 3; // 3 inches
        const GAP = 2;
        const API_ENDPOINT = typeof __api_endpoint !== 'undefined' ? __api_endpoint : '/api/upload';        

        // --- State ---
        const canvas = document.getElementById('viewport');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        let camera = { x: (GRID_WIDTH * (CELL_SIZE + GAP)) / 2, y: (GRID_HEIGHT * (CELL_SIZE + GAP)) / 2, zoom: 0.2 };
        let targetCamera = { x: camera.x, y: camera.y, zoom: camera.zoom };
        
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        let occupiedCells = new Map(); // id -> { img: Image, loaded: bool }
        let selectedCell = null;
        let currentUser = null;
        // Mobile touch helpers
        let lastTap = 0;
        let lastTapPos = null;
        let pinch = { active: false, startDist: 0, startZoom: 0 };

        // --- Init ---
        async function init() {
            // Test API Server connection first
            console.log('🔗 Checking API Server connection...');
            const apiConnected = await testAPIConnection();
            
            // Initialize IndexedDB cache first
            try {
                await initIndexedDB();
                const stats = await getCacheStats();
                console.log('✓ IndexedDB cache initialized:', stats.images, 'images,', (stats.size / 1024 / 1024).toFixed(2), 'MB');
            } catch (err) {
                console.warn('IndexedDB initialization failed, images will load without persistent cache:', err);
            }
            
            // Check cookies
            const recentImages = getCookie('cubewall_recent');
            if (recentImages) {
                console.log('✓ Cookies enabled:', recentImages.split(',').length, 'recent images tracked');
            }
            
            resize();
            window.addEventListener('resize', resize);
            
            canvas.addEventListener('mousedown', startDrag);
            window.addEventListener('mousemove', drag);
            window.addEventListener('mouseup', stopDrag);
            canvas.addEventListener('wheel', handleZoom, { passive: false });
            canvas.addEventListener('dblclick', handleDblClick);

            // Touch support: single-finger pan, two-finger pinch zoom, and double-tap
            canvas.addEventListener('touchstart', touchStart, { passive: false });
            canvas.addEventListener('touchmove', touchMove, { passive: false });
            canvas.addEventListener('touchend', touchEnd, { passive: false });
            canvas.addEventListener('touchcancel', touchEnd, { passive: false });

            updateLoading("Loading images from database...");

            // If API is reachable, load from SQL Server; otherwise load cached images
            if (apiConnected) {
                // Load images from SQL Server with pagination for large datasets
                try {
                    let allImages = [];
                    let page = 0;
                    let hasMore = true;

                    // Load images in batches (pagination)
                    while (hasMore && page < 100) { // Max 50k images per session
                        const batchImages = await getAllImagesFromSQLServerPaginated(page);
                        if (batchImages.length === 0) {
                            hasMore = false;
                        } else {
                            allImages = allImages.concat(batchImages);
                            page++;
                            // Show progress for large loads
                            if (page % 5 === 0) {
                                updateLoading(`Loading images... ${allImages.length} loaded`);
                            }
                        }
                    }

                    console.log(`✓ Loaded ${allImages.length} images from SQL Server (${page} pages)`);

                    // Cache all SQL Server images locally (in batches to avoid blocking)
                    const batchSize = 50;
                    for (let i = 0; i < allImages.length; i += batchSize) {
                        const batch = allImages.slice(i, i + batchSize);
                        batch.forEach(imgData => {
                            const id = imgData.cellId || imgData.id;
                            if (id && imgData.image) {
                                const img = new Image();
                                img.src = imgData.image;
                                img.onload = () => {
                                    occupiedCells.set(id, { img, loaded: true });
                                    cacheImage(id, imgData.image).catch(() => {});
                                };
                                img.onerror = () => console.warn('Failed to load image:', id);
                            }
                        });
                        // Allow UI to update between batches
                        await new Promise(resolve => setTimeout(resolve, 10));
                    }

                    const stats = await getCacheStats();
                    console.log(`✓ Cache status: ${stats.images} images, ${(stats.size / 1024 / 1024).toFixed(2)} MB`);
                } catch (err) {
                    console.warn('Failed to load images from SQL Server:', err);
                }
            } else {
                // API not reachable — load what we have cached locally so the visitor still sees images
                try {
                    await loadAllCachedImages();
                } catch (err) {
                    console.warn('Failed to load local cached images:', err);
                }
            }
            
            updateLoading("Authenticating...");
            
            // Only try Firebase auth if Firebase is initialized
            if (auth) {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                } catch (e) {
                    console.warn("Firebase Auth Error (will continue offline):", e);
                    // Create a fallback anonymous user
                    currentUser = { uid: 'anonymous-' + Math.random().toString(36).substr(2, 9), isAnonymous: true };
                    updateLoading("");
                    subscribeToWall();
                    requestAnimationFrame(render);
                    return;
                }

                auth.onAuthStateChanged(user => {
                    if (user) {
                        currentUser = user;
                    } else {
                        currentUser = { uid: 'anonymous-' + Math.random().toString(36).substr(2, 9), isAnonymous: true };
                    }
                    updateLoading("");
                    subscribeToWall();
                });
            } else {
                // Firebase not available, create anonymous user and continue
                console.log('ℹ Firebase not available, running in SQL Server + cache mode');
                currentUser = { uid: 'anonymous-' + Math.random().toString(36).substr(2, 9), isAnonymous: true };
                updateLoading("");
                subscribeToWall();
            }

            requestAnimationFrame(render);
        }

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const cssWidth = Math.max(1, Math.floor(window.innerWidth));
            const cssHeight = Math.max(1, Math.floor(window.innerHeight));
            canvas.style.width = cssWidth + 'px';
            canvas.style.height = cssHeight + 'px';
            canvas.width = Math.floor(cssWidth * dpr);
            canvas.height = Math.floor(cssHeight * dpr);
            width = cssWidth;
            height = cssHeight;
            // Set rendering scale for high-DPI displays
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        // --- Mobile touch handlers (pan, pinch-to-zoom, double-tap) ---
        function getTouchDist(t1, t2) {
            const dx = t1.clientX - t2.clientX;
            const dy = t1.clientY - t2.clientY;
            return Math.hypot(dx, dy);
        }

        function touchStart(e) {
            if (!e.touches) return;
            e.preventDefault();
            if (e.touches.length === 1) {
                const t = e.touches[0];
                startDrag({ clientX: t.clientX, clientY: t.clientY });
            } else if (e.touches.length === 2) {
                pinch.active = true;
                pinch.startDist = getTouchDist(e.touches[0], e.touches[1]);
                pinch.startZoom = targetCamera.zoom;
            }
        }

        function touchMove(e) {
            if (!e.touches) return;
            e.preventDefault();
            if (pinch.active && e.touches.length === 2) {
                const newDist = getTouchDist(e.touches[0], e.touches[1]);
                const factor = newDist / (pinch.startDist || newDist);

                const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                const worldX = (centerX - width / 2) / targetCamera.zoom + targetCamera.x;
                const worldY = (centerY - height / 2) / targetCamera.zoom + targetCamera.y;

                targetCamera.zoom = Math.max(0.005, Math.min(20, pinch.startZoom * factor));
                targetCamera.x = worldX - (centerX - width / 2) / targetCamera.zoom;
                targetCamera.y = worldY - (centerY - height / 2) / targetCamera.zoom;
            } else if (e.touches.length === 1 && isDragging) {
                const t = e.touches[0];
                drag({ clientX: t.clientX, clientY: t.clientY });
            }
        }

        function touchEnd(e) {
            if (pinch.active) pinch.active = false;
            stopDrag();

            const now = Date.now();
            if (e.changedTouches && e.changedTouches.length > 0) {
                const t = e.changedTouches[0];
                if (now - lastTap < 300 && lastTapPos && Math.hypot(lastTapPos.x - t.clientX, lastTapPos.y - t.clientY) < 30) {
                    handleDblClick({ clientX: t.clientX, clientY: t.clientY });
                    lastTap = 0;
                    lastTapPos = null;
                } else {
                    lastTap = now;
                    lastTapPos = { x: t.clientX, y: t.clientY };
                }
            }
        }

        function startDrag(e) { isDragging = true; lastMouse = { x: e.clientX, y: e.clientY }; }
        function stopDrag() { isDragging = false; }
        
        function drag(e) {
            if (!isDragging) return;
            const dx = e.clientX - lastMouse.x;
            const dy = e.clientY - lastMouse.y;
            
            targetCamera.x -= dx / camera.zoom;
            targetCamera.y -= dy / camera.zoom;
            
            camera.x = targetCamera.x;
            camera.y = targetCamera.y;
            
            lastMouse = { x: e.clientX, y: e.clientY };
        }

        function handleZoom(e) {
            e.preventDefault();
            const factor = Math.pow(1.5, -e.deltaY / 100);
            
            const mouseWorldX = (e.clientX - width / 2) / targetCamera.zoom + targetCamera.x;
            const mouseWorldY = (e.clientY - height / 2) / targetCamera.zoom + targetCamera.y;
            
            targetCamera.zoom *= factor;
            targetCamera.zoom = Math.max(0.005, Math.min(20, targetCamera.zoom));

            targetCamera.x = mouseWorldX - (e.clientX - width / 2) / targetCamera.zoom;
            targetCamera.y = mouseWorldY - (e.clientY - height / 2) / targetCamera.zoom;
        }

        function handleDblClick(e) {
            const worldX = (e.clientX - width / 2) / camera.zoom + camera.x;
            const worldY = (e.clientY - height / 2) / camera.zoom + camera.y;

            const gridX = Math.floor(worldX / (CELL_SIZE + GAP));
            const gridY = Math.floor(worldY / (CELL_SIZE + GAP));

            if (gridX >= 0 && gridX < GRID_WIDTH && gridY >= 0 && gridY < GRID_HEIGHT) {
                const id = `${gridX}_${gridY}`;
                selectedCell = { x: gridX, y: gridY, id };
                openModal();
            }
        }

        function subscribeToWall() {
            // Skip Firebase if not initialized
            if (!db) {
                console.log('ℹ Firebase not available, loading from SQL Server + cache only');
                return;
            }
            
            // Fix: Correct path structure for public data
            const wallRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cells');
            
            wallRef.onSnapshot(snap => {
                snap.docChanges().forEach(change => {
                    if (change.type === 'added' || change.type === 'modified') {
                        const data = change.doc.data();
                        const id = change.doc.id;
                        
                        // Try to load from cache first (fastest)
                        getImageFromCache(id).then(cachedData => {
                            if (cachedData) {
                                // Use cached image immediately
                                const img = new Image();
                                img.src = cachedData;
                                img.onload = () => {
                                    occupiedCells.set(id, { img, loaded: true });
                                };
                            } else {
                                // Not in cache, try SQL Server next
                                fetchImageFromSQLServer(id).then(sqlImage => {
                                    if (sqlImage) {
                                        // Load from SQL Server and cache it
                                        const img = new Image();
                                        img.src = sqlImage;
                                        img.onload = () => {
                                            occupiedCells.set(id, { img, loaded: true });
                                            cacheImage(id, sqlImage).catch(() => {});
                                        };
                                        img.onerror = () => console.warn('Failed to load image from SQL Server for cell:', id);
                                    } else if (data.image) {
                                        // Fall back to Firebase
                                        const img = new Image();
                                        img.src = data.image;
                                        img.onload = () => {
                                            occupiedCells.set(id, { img, loaded: true });
                                            cacheImage(id, data.image).catch(() => {});
                                        };
                                        img.onerror = () => console.warn('Failed to load image from Firebase for cell:', id);
                                    }
                                }).catch(() => {
                                    // SQL Server fetch failed, try Firebase
                                    if (data.image) {
                                        const img = new Image();
                                        img.src = data.image;
                                        img.onload = () => {
                                            occupiedCells.set(id, { img, loaded: true });
                                            cacheImage(id, data.image).catch(() => {});
                                        };
                                        img.onerror = () => console.warn('Failed to load image for cell:', id);
                                    }
                                });
                            }
                        }).catch(err => {
                            // Cache read failed, try SQL Server
                            fetchImageFromSQLServer(id).then(sqlImage => {
                                if (sqlImage) {
                                    const img = new Image();
                                    img.src = sqlImage;
                                    img.onload = () => {
                                        occupiedCells.set(id, { img, loaded: true });
                                        cacheImage(id, sqlImage).catch(() => {});
                                    };
                                    img.onerror = () => console.warn('Failed to load image from SQL Server for cell:', id);
                                } else if (data.image) {
                                    const img = new Image();
                                    img.src = data.image;
                                    img.onload = () => {
                                        occupiedCells.set(id, { img, loaded: true });
                                        cacheImage(id, data.image).catch(() => {});
                                    };
                                }
                            }).catch(() => {
                                // All sources failed, use Firebase as last resort
                                if (data.image) {
                                    const img = new Image();
                                    img.src = data.image;
                                    img.onload = () => {
                                        occupiedCells.set(id, { img, loaded: true });
                                        cacheImage(id, data.image).catch(() => {});
                                    };
                                }
                            });
                        });
                    }
                });
                document.getElementById('loading-indicator').style.display = 'none';
            }, err => {
                console.error("Firestore Error:", err);
                updateLoading("Error loading wall data.");
            });
        }

        async function upload() {
            const input = document.getElementById('image-input');
            if (!input.files[0] || !selectedCell) {
                alert("Please select an image and a cell.");
                return;
            }

            const btn = document.getElementById('btn-upload');
            const originalText = btn.innerText;
            btn.disabled = true;

            try {
                // Start compression immediately
                btn.innerText = "Processing...";
                const startTime = performance.now();
                const base64 = await compress(input.files[0]);
                const compressTime = performance.now() - startTime;
                
                btn.innerText = "Uploading...";
                const uid = currentUser?.uid || 'anonymous-' + Math.random().toString(36).substr(2, 9);
                
                // Prepare upload data
                const uploadData = {
                    image: base64,
                    uid: uid,
                    cellId: selectedCell.id,
                    gridX: selectedCell.x,
                    gridY: selectedCell.y,
                    appId: appId,
                    timestamp: new Date().toISOString()
                };
                
                // Try SQL Server first (primary storage for large database)
                let sqlSuccess = false;
                try {
                    sqlSuccess = await saveImageToSQLServer(uploadData);
                    if (sqlSuccess) {
                        console.log("✓ Image saved to SQL Server Database");
                        btn.innerText = "Saving to cache...";
                    }
                } catch (e) {
                    console.warn("SQL Server save failed:", e.message);
                }
                
                // Cache locally for instant loading
                try {
                    await cacheImage(selectedCell.id, base64);
                    console.log("✓ Image cached locally");
                } catch (e) {
                    console.warn("Local cache save failed:", e.message);
                }
                
                // Also save to Firebase as backup/sync
                try {
                    if (db) {
                        const firebasePromise = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('cells').doc(selectedCell.id).set({
                            image: base64,
                            uid: uid,
                            ts: firebase.firestore.FieldValue.serverTimestamp(),
                            sqlSaved: sqlSuccess,
                            cached: true
                        }, { merge: true });
                        
                        const timeoutPromise = new Promise((_, reject) => 
                            setTimeout(() => reject(new Error('Upload timeout')), 10000)
                        );
                        
                        await Promise.race([firebasePromise, timeoutPromise]);
                        console.log("✓ Image synced to Firebase");
                    } else {
                        console.log("ℹ Firebase not available, image saved to SQL Server and cache only");
                    }
                } catch (e) {
                    console.warn("Firebase sync failed:", e.message);
                    if (!sqlSuccess) {
                        throw new Error("Failed to save to SQL Server or Firebase");
                    }
                }
                
                btn.innerText = "✓ Done!";
                setTimeout(() => {
                    closeModal();
                    btn.innerText = originalText;
                }, 500);
            } catch (e) {
                console.error("Upload Error:", e);
                alert("Upload failed: " + (e.message || "Unknown error"));
                btn.innerText = originalText;
            } finally {
                btn.disabled = false;
            }
        }

        function compress(file) {
            return new Promise((resolve, reject) => {
                if (!file.type.startsWith('image/')) {
                    reject(new Error('Please select a valid image file'));
                    return;
                }
                
                const reader = new FileReader();
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.onload = (e) => {
                    const img = new Image();
                    img.onerror = () => reject(new Error('Failed to load image'));
                    img.onload = () => {
                        try {
                            const c = document.createElement('canvas');
                            // Ultra-small for fast upload
                            c.width = c.height = 64; 
                            c.getContext('2d').drawImage(img, 0, 0, 64, 64);
                            // Check for webp support for better compression
                            const formats = ['image/webp', 'image/jpeg'];
                            let result;
                            for (let fmt of formats) {
                                try {
                                    result = c.toDataURL(fmt, 0.4);
                                    if (result && result.length < 50000) {
                                        resolve(result);
                                        return;
                                    }
                                } catch (e) {}
                            }
                            // Fallback to aggressive JPEG
                            resolve(c.toDataURL('image/jpeg', 0.3));
                        } catch (err) {
                            reject(new Error('Failed to compress image: ' + err.message));
                        }
                    }
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function openModal() {
            document.getElementById('upload-modal').style.display = 'block';
            document.getElementById('cube-id-display').innerText = `Location: X ${selectedCell.x}, Y ${selectedCell.y}`;
        }
        function closeModal() {
            document.getElementById('upload-modal').style.display = 'none';
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('image-input').value = '';
            selectedCell = null;
        }
        function updateLoading(t) { document.getElementById('loading-text').innerText = t; }

        function render() {
            const lerpFactor = 0.25;
            camera.zoom += (targetCamera.zoom - camera.zoom) * lerpFactor;
            camera.x += (targetCamera.x - camera.x) * lerpFactor;
            camera.y += (targetCamera.y - camera.y) * lerpFactor;

            // Clear using CSS pixel dimensions (context already scaled for DPR in resize)
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(width / 2, height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.x, -camera.y);

            const startX = Math.max(0, Math.floor((camera.x - (width / 2) / camera.zoom) / (CELL_SIZE + GAP)) - 1);
            const endX = Math.min(GRID_WIDTH, Math.ceil((camera.x + (width / 2) / camera.zoom) / (CELL_SIZE + GAP)) + 1);
            const startY = Math.max(0, Math.floor((camera.y - (height / 2) / camera.zoom) / (CELL_SIZE + GAP)) - 1);
            const endY = Math.min(GRID_HEIGHT, Math.ceil((camera.y + (height / 2) / camera.zoom) / (CELL_SIZE + GAP)) + 1);

            ctx.fillStyle = '#111';
            for (let x = startX; x < endX; x++) {
                for (let y = startY; y < endY; y++) {
                    const px = x * (CELL_SIZE + GAP);
                    const py = y * (CELL_SIZE + GAP);
                    
                    const id = `${x}_${y}`;
                    const cell = occupiedCells.get(id);

                    if (cell && cell.loaded) {
                        ctx.drawImage(cell.img, px, py, CELL_SIZE, CELL_SIZE);
                    } else {
                        ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
                    }
                }
            }

            ctx.restore();

            document.getElementById('coord-x').innerText = Math.round(camera.x / (CELL_SIZE + GAP));
            document.getElementById('coord-y').innerText = Math.round(camera.y / (CELL_SIZE + GAP));
            document.getElementById('zoom-val').innerText = camera.zoom.toFixed(2);

            requestAnimationFrame(render);
        }

        document.getElementById('btn-upload').onclick = upload;
        document.getElementById('btn-cancel').onclick = closeModal;
        document.getElementById('image-input').onchange = function() {
            if (!this.files[0]) {
                document.getElementById('preview-container').classList.add('hidden');
                return;
            }
            
            const reader = new FileReader();
            reader.onerror = () => {
                alert('Failed to read the image file');
                this.value = '';
            };
            reader.onload = e => {
                try {
                    const img = document.getElementById('image-preview');
                    img.src = e.target.result;
                    img.onerror = () => {
                        alert('Invalid image format');
                        document.getElementById('image-input').value = '';
                        document.getElementById('preview-container').classList.add('hidden');
                    };
                    document.getElementById('preview-container').classList.remove('hidden');
                } catch (err) {
                    alert('Error loading image: ' + err.message);
                    this.value = '';
                }
            };
            reader.readAsDataURL(this.files[0]);
        };

        init();
    </script>
</body>
